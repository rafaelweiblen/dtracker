# Dependabot — minor+patch agrupados; majors em PRs separados.
# Segurança: GitHub continua a abrir Dependabot security updates além destes version updates.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot-yml-file

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    groups:
      prod-minor-patch:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 4
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
